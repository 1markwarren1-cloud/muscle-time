<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15191c">
<title>Muscle Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muscle Time">
<style>
  :root{
    --bg:#15191c; --bg2:#1b2024; --card:#1e242a; --card2:#262d34;
    --line:#2d363d; --text:#e7edf0; --muted:#9aa9b1; --muted2:#6d7d85;
    --accent:#6fb6a6; --accent2:#86acd2; --good:#79c2a6; --bad:#d98a8a; --blue:#86acd2;
    --r:16px; --maxw:680px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  html,body{margin:0; padding:0}
  body{background:var(--bg); color:var(--text);
    font-family:"Raleway",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:150px; line-height:1.55; letter-spacing:.1px; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 16px}
  header{position:sticky; top:0; z-index:20; background:var(--bg);
    padding:max(14px,env(safe-area-inset-top)) 0 8px;}
  .brand{display:flex; align-items:center; gap:10px; padding:0 16px; max-width:var(--maxw); margin:0 auto}
  .logo{width:30px;height:30px;border-radius:9px;overflow:hidden;flex-shrink:0}
  .logo svg{display:block;width:100%;height:100%}
  .brand h1{font-size:19px; margin:0; letter-spacing:.3px; font-weight:600}
  .brand .sub{font-size:11.5px;color:var(--muted2);margin-top:-2px}

  .grouphdr{display:flex;align-items:center;gap:8px;margin:22px 2px 10px}
  .grouphdr span{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:600}
  .grouphdr .ln{flex:1;height:1px;background:var(--line)}

  .wkbtn{width:100%;display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);
    color:var(--text);border-radius:18px;padding:13px 15px;cursor:pointer;margin:2px 0 12px}
  .wktoolbar{position:sticky;top:var(--headh,60px);z-index:15;background:var(--bg);padding-top:6px}
  .wktoolbar .sessprog{margin-bottom:12px}
  .wkbtn .ico{font-size:22px} .wkbtn .wkmid{flex:1;min-width:0;text-align:left}
  .wkbtn .nm{display:block;font-weight:750;font-size:16px}
  .wkbtn .sub2{display:block;font-size:11.5px;color:var(--muted2);margin-top:1px}
  .wkbtn .chev{margin-left:auto;color:var(--muted);font-size:12px;font-weight:700}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
  .ex-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .ex-name{font-size:16px;font-weight:700}
  .ex-target{font-size:12px;color:var(--muted2);margin-top:2px}
  .ex-note{font-size:11.5px;color:var(--muted2);margin-top:6px;font-style:italic}
  .ex-pr{font-size:11px;color:var(--accent2);margin-top:5px;font-weight:600}
  .sessprog{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:14px}
  .sp-top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:7px}
  .sp-top #spPct{color:var(--accent2)}
  .sp-bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden}
  .sp-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .3s}
  .ex-prog{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:3px;font-size:13px}
  .ex-prog .lastv{color:var(--muted2)}
  .ex-prog .arrow{color:var(--muted2);font-weight:700}
  .ex-prog .goalv{color:var(--accent2);font-weight:750}
  .levelup{margin-top:5px;font-size:11.5px;color:var(--good);font-weight:700}
  .ex-name .exdone{display:none;color:var(--good);margin-left:7px}
  .cardDone{border-color:rgba(121,194,166,.4);background:#192420}
  .cardDone .ex-name .exdone{display:inline}

  table.sets{width:100%;border-collapse:collapse;margin-top:12px}
  table.sets th{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted2);font-weight:700;text-align:center;padding:0 0 6px}
  table.sets th.l{text-align:left;padding-left:2px}
  table.sets td{padding:4px 3px;text-align:center;vertical-align:middle}
  .setn{width:30px;color:var(--muted);font-weight:700;font-size:13px}
  .prev{font-size:11px;color:var(--muted2);min-width:54px}
  input.num{width:100%;max-width:72px;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:9px 6px;font-size:16px;text-align:center;font-weight:600;outline:none}
  input.num:focus{border-color:var(--accent)}
  .sets{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .setrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;row-gap:6px}
  .startbtn{background:var(--card2);border:1px solid var(--accent);color:var(--accent2);border-radius:999px;
    padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;min-width:74px;text-align:center;font-variant-numeric:tabular-nums}
  .startbtn.running{background:var(--accent);color:#fff;border-color:var(--accent)}
  .setn2{font-size:12.5px;font-weight:700;color:var(--muted);min-width:40px}
  .prev2{font-size:10.5px;color:var(--muted2);min-width:52px;line-height:1.1}
  .inwrap{display:flex;align-items:center;gap:5px}
  .inwrap input.num{width:54px;max-width:54px;padding:9px 5px}
  .unit{font-size:12px;color:var(--muted2);font-weight:600}
  .setrow .done{margin-left:auto}
  .done{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--bg2);
    color:var(--muted2);font-size:16px;display:inline-grid;place-items:center;cursor:pointer}
  .done.on{background:var(--good);border-color:var(--good);color:#06241a;font-weight:800}
  .rowtools{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
  .mini{background:none;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:6px 13px;font-size:12px;cursor:pointer}
  .mini:active{background:var(--card2)}

  .btn{display:block;width:100%;border:none;border-radius:999px;padding:15px;font-size:16px;font-weight:650;cursor:pointer;color:#13302a;
    background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .btn:active{filter:brightness(.94)}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--text)}
  .btn.danger{background:none;border:1px solid var(--bad);color:var(--bad)}
  .btn.sm{padding:11px;font-size:14px}
  .row2{display:flex;gap:10px} .row2>*{flex:1;min-width:0}

  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:6px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px}
  .stat .v{font-size:24px;font-weight:600;letter-spacing:.3px}
  .stat .k{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .stat .v.accent{color:var(--accent)} .stat .v.blue{color:var(--blue)}
  .stat .d{font-size:11px;font-weight:700;margin-top:3px}
  .d.up{color:var(--good)} .d.down{color:var(--bad)} .d.flat{color:var(--muted2)}

  select.sel{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:11px;font-size:15px;margin-bottom:12px}
  .field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted2);font-weight:700;padding-left:2px}
  .field input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:12px;font-size:17px;font-weight:600;text-align:center;outline:none}
  .field input:focus{border-color:var(--accent)}

  .hist{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer}
  .hist .h-top{display:flex;justify-content:space-between;align-items:center}
  .hist .h-date{font-weight:700;font-size:15px}
  .hist .h-sub{font-size:12px;color:var(--muted2);margin-top:3px}
  .hist .h-vol{font-size:13px;color:var(--accent2);font-weight:700;text-align:right}
  .hist .h-vol small{display:block;color:var(--muted2);font-weight:500;font-size:10px}
  .hist .detail{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);display:none}
  .hist.open .detail{display:block}
  .hist .dl{font-size:12.5px;color:var(--muted);display:flex;justify-content:space-between;padding:3px 0}
  .hist .dl b{color:var(--text);font-weight:600}

  .empty{text-align:center;color:var(--muted2);padding:50px 20px;font-size:14px}
  .empty .big{font-size:40px;margin-bottom:10px}

  .chartcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
  .chartcard .ct{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:2px}
  .chartcard .cs{font-size:11px;color:var(--muted2);margin-bottom:8px}
  svg.chart{width:100%;display:block;overflow:visible}
  .chart text{font-size:9px;fill:var(--muted2)}

  /* PLAN */
  .plan-intro{background:linear-gradient(135deg,#1f2a28,#1b2024);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:6px}
  .plan-intro h3{margin:0 0 6px;font-size:17px}
  .plan-intro p{margin:0;font-size:12.5px;color:var(--muted)}
  .plan-intro .pills{margin-top:10px}
  .pill{display:inline-block;background:var(--card2);border:1px solid var(--line);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:999px;margin:0 6px 6px 0;font-weight:600}
  .dayrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px;cursor:pointer}
  .dayrow .dnum{font-size:11px;font-weight:800;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px;min-width:42px}
  .dayrow .dico{font-size:20px}
  .dayrow .dnm{font-weight:700;font-size:14.5px}
  .dayrow .dds{font-size:11px;color:var(--muted2)}
  .dayrow .go{margin-left:auto;color:var(--muted);font-size:12px;font-weight:700}
  .weekcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px}
  .weekcard .wkn{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:7px;text-transform:uppercase;letter-spacing:.5px}
  .weekcard .wkt{font-weight:750;font-size:15px;margin:8px 0 5px}
  .weekcard .wknote{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .weekcard ul{margin:0;padding-left:18px}
  .weekcard li{font-size:12.5px;color:var(--muted);margin-bottom:3px}

  nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(21,23,30,.93);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;padding:6px 2px max(6px,env(safe-area-inset-bottom))}
  nav button{flex:1;background:none;border:none;color:var(--muted2);padding:8px 0 6px;font-size:9.5px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600}
  nav button .ic{font-size:18px;line-height:1}
  nav button.on{color:var(--accent2)}

  #restbar{position:fixed;left:0;right:0;z-index:29;bottom:calc(60px + env(safe-area-inset-bottom));display:none;justify-content:center;pointer-events:none}
  #restbar.show{display:flex}
  .restinner{pointer-events:auto;max-width:var(--maxw);width:calc(100% - 24px);margin:0 12px 8px;
    background:linear-gradient(135deg,#1d2730,#212a2a);border:1px solid var(--accent);border-radius:14px;
    padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .restinner .rt{font-size:22px;font-weight:800;color:var(--accent2);min-width:64px;font-variant-numeric:tabular-nums}
  .restinner .rl{font-size:11px;color:var(--muted);flex:1;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .restinner button{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
  .restinner button.skip{background:none;border-color:var(--accent);color:var(--accent2)}

  /* SHEET */
  #sheet{position:fixed;inset:0;z-index:40;display:none}
  #sheet.show{display:block}
  #sheet .scrim{position:absolute;inset:0;background:rgba(0,0,0,.55)}
  .sheetbody{position:absolute;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--line);
    border-radius:20px 20px 0 0;max-height:82vh;overflow:auto;padding:6px 16px max(20px,env(safe-area-inset-bottom));max-width:var(--maxw);margin:0 auto}
  .sheethandle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:8px auto 8px}
  .sheet-title{font-size:16px;font-weight:800;margin:2px 2px 12px}
  .wk-opt{display:flex;gap:12px;align-items:flex-start;padding:13px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;cursor:pointer;background:var(--card)}
  .wk-opt.on{border-color:var(--accent);background:#1d2a27}
  .wk-opt .ico{font-size:22px;line-height:1.2}
  .wk-opt .nm{font-weight:750;font-size:15px}
  .wk-opt .ds{font-size:12px;color:var(--muted2);margin-top:2px}
  .wk-opt .meta{font-size:11px;color:var(--muted2);margin-top:4px}
  .wk-opt .ck{margin-left:auto;color:var(--accent2);font-weight:800;font-size:18px}

  .coachhero{background:linear-gradient(135deg,#1d2a27,#1c2730);border:1px solid var(--accent);border-radius:18px;padding:16px;margin-bottom:14px}
  .ch-label{font-size:11px;letter-spacing:1px;color:var(--accent2);font-weight:800}
  .ch-reason{font-size:13px;color:var(--muted);margin:8px 0 11px;line-height:1.45}
  .ch-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .ch-ico{font-size:34px} .ch-name{font-size:22px;font-weight:650}
  .coachhero.chdone{border-color:var(--good)}
  .ch-donerow{display:flex;align-items:center;gap:11px;margin:8px 0}
  .ch-donecheck{width:26px;height:26px;border-radius:50%;background:var(--good);color:#06241a;display:grid;place-items:center;font-weight:800;font-size:15px;flex-shrink:0}
  .ch-doneico{font-size:22px}
  .ch-donename{font-size:18px;font-weight:800;line-height:1.2}
  .ch-donename small{display:block;font-size:11px;color:var(--muted2);font-weight:600}
  .chcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .chc-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:4px}
  .chc-em{color:var(--accent2);font-weight:800} .chc-sub{font-size:11px;color:var(--muted2);font-weight:500}
  .mb-row{display:flex;align-items:center;gap:10px;margin-top:9px}
  .mb-k{width:48px;font-size:12px;color:var(--muted);font-weight:600}
  .mb-bar{flex:1;height:9px;background:var(--bg2);border-radius:99px;overflow:hidden}
  .mb-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px}
  .mb-v{width:22px;text-align:right;font-size:12px;color:var(--muted);font-weight:700}
  .mb-flag{margin-top:11px;font-size:12px;color:var(--text)} .mb-flag b{color:var(--accent)}
  .ins-row{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text);padding:8px 0;border-bottom:1px solid var(--line);line-height:1.4}
  .ins-row:last-child{border-bottom:none} .ins-ic{font-size:16px}
  .bodymap{width:100%;max-width:300px;display:block;margin:6px auto 0}
  .bm-legend{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:6px;font-size:10.5px;color:var(--muted2)}
  .bm-grad{width:120px;height:7px;border-radius:99px;background:linear-gradient(90deg,rgba(111,182,166,.16),#6fb6a6)}
  #celebrate{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;overflow:hidden}
  #celebrate.show{display:flex}
  .cele-scrim{position:absolute;inset:0;background:rgba(0,0,0,.62)}
  .cele-card{position:relative;z-index:2;background:var(--card);border:1px solid var(--accent);border-radius:20px;
    padding:26px 22px;max-width:340px;width:calc(100% - 48px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:celePop .35s cubic-bezier(.2,1.3,.4,1)}
  @keyframes celePop{0%{transform:scale(.82);opacity:0}100%{transform:scale(1);opacity:1}}
  .cele-emoji{font-size:46px}
  .cele-title{font-size:22px;font-weight:700;margin:6px 0 14px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .cele-body{margin-bottom:18px}
  .cele-ex{margin-bottom:12px;font-size:14px;color:var(--text);line-height:1.5}
  .cele-ex b{font-size:16px;color:var(--accent2)}
  .cele-ex span{color:var(--muted);font-size:13px}
  .confetti{position:absolute;top:-20px;width:9px;height:9px;border-radius:2px;z-index:1;animation:celeFall linear forwards}
  @keyframes celeFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(112vh) rotate(620deg);opacity:.9}}
  #builder{position:fixed;inset:0;z-index:45;display:none}
  #builder.show{display:block}
  .builder-panel{position:absolute;inset:0;max-width:var(--maxw);margin:0 auto;background:var(--bg);display:flex;flex-direction:column}
  .builder-head{padding:max(16px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--line)}
  .bx{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px}
  .bname{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:12px;font-size:16px;font-weight:600;outline:none;margin-top:10px}
  .bname:focus{border-color:var(--accent)}
  .builder-hint{font-size:12px;color:var(--muted2);margin-top:8px;line-height:1.4}
  .builder-list{flex:1;overflow:auto;padding:6px 16px}
  .builder-foot{padding:10px 16px max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--bg)}
  .lib-group{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--accent2);font-weight:800;margin:14px 2px 8px}
  .lib-row{display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;background:var(--card)}
  .lib-row.on{border-color:var(--accent);background:#1d2a27}
  .lib-check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line);display:grid;place-items:center;font-size:14px;color:transparent;flex-shrink:0}
  .lib-row.on .lib-check{background:var(--accent);border-color:var(--accent);color:#fff}
  .lib-info{flex:1;min-width:0}
  .lib-name{font-weight:700;font-size:14.5px}
  .lib-sug{font-size:11.5px;color:var(--muted2);margin-top:2px}
  .lib-sug b{color:var(--accent2);font-weight:700}
  .lib-tag{color:var(--good);font-weight:700}
  .hide{display:none!important}
  .toast{position:fixed;left:50%;bottom:150px;transform:translateX(-50%);background:var(--good);color:#06241a;
    font-weight:700;padding:11px 18px;border-radius:12px;font-size:14px;z-index:50;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

<script>
(function(){
"use strict";
var K_WK="mt_workouts_v3", K_SESS="mt_sessions_v2", K_CUR="mt_current_v3", K_BODY="mt_body_v2", K_SET="mt_settings_v3";
function load(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}

var DEFAULT_WORKOUTS=[

   ]},
  {id:"push", name:"Push Day", icon:"🤜",

    {id:"row1",   group:"Back", name:"One-arm DB Row", sets:4, reps:"12 / arm", w:10, note:"Braced on chair · full stretch"},
    {id:"kbrow",  group:"Back", name:"KB Bent-over Row", sets:3, reps:"12", w:24, note:"Both KBs · pull to hips"},
    {id:"highpull",group:"Back",name:"KB High Pull", sets:3, reps:"12", w:14, note:"Explosive up · control down"},
    {id:"shrug",  group:"Back", name:"DB Shrug", sets:3, reps:"15", w:10, note:"Pause at top · traps"},
    {id:"reardelt",group:"Back",name:"Rear Delt Fly", sets:3, reps:"15", w:6, note:"Bent over · squeeze blades"},
    {id:"curl2",  group:"Arms", name:"Biceps Curl", sets:3, reps:"12", w:10, note:"3s lower"},
    {id:"hammer2",group:"Arms", name:"Hammer Curl", sets:3, reps:"12", w:10, note:"Palms in"}
   ]},
  {id:"legs", name:"Leg Day", icon:"🦵",
   desc:"Quads, hamstrings, glutes & calves. Squats, split squats and hip hinges.",
   ex:[
    {id:"lg_gob", group:"Legs", name:"Goblet Squat", sets:4, reps:"15", w:14, note:"3s down · pause at bottom"},
    {id:"lg_bss", group:"Legs", name:"Bulgarian Split Squat", sets:3, reps:"12 / leg", w:10, note:"Rear foot on chair/bed"},
    {id:"lg_rdl", group:"Legs", name:"KB Romanian Deadlift", sets:4, reps:"12", w:24, note:"Both KBs · feel hamstrings"},
    {id:"lg_slrdl",group:"Legs",name:"Single-leg KB RDL", sets:3, reps:"10 / leg", w:14, note:"Balance + glute/hamstring"},
    {id:"lg_tmp", group:"Legs", name:"Tempo Squat", sets:2, reps:"20", w:14, note:"Burn-out · controlled"},
    {id:"lg_calf",group:"Legs", name:"Standing Calf Raise", sets:4, reps:"20", w:24, note:"Full stretch · 1s squeeze"}
   ]},
  {id:"armslegs", name:"Arms & Legs", icon:"💪",
   desc:"Your original combo session — arms and legs trained together.",
   ex:[
    {id:"goblet", group:"Legs", name:"Goblet Squat", sets:4, reps:"15", w:14, note:"3s down · pause at bottom"},
    {id:"bss",    group:"Legs", name:"Bulgarian Split Squat", sets:3, reps:"12 / leg", w:10, note:"Rear foot on chair/bed"},
    {id:"kbrdl",  group:"Legs", name:"KB Romanian Deadlift", sets:3, reps:"15", w:24, note:"Both KBs · slow lower"},
    {id:"tsquat", group:"Legs", name:"Tempo Squat", sets:2, reps:"20", w:14, note:"Burn-out"},
    {id:"calf",   group:"Legs", name:"Standing Calf Raise", sets:3, reps:"20", w:24, note:"Full stretch"},
    {id:"curl",   group:"Arms", name:"Biceps Curl", sets:3, reps:"12", w:10, note:"3s lower · no swing"},
    {id:"oht",    group:"Arms", name:"KB Overhead Triceps Ext.", sets:3, reps:"12", w:14, note:"Full stretch"},
    {id:"hammer", group:"Arms", name:"Hammer Curl", sets:3, reps:"12", w:10, note:"Palms in"},
    {id:"saoht",  group:"Arms", name:"Single-arm Triceps Ext.", sets:2, reps:"15 / arm", w:6, note:"Strict"},
    {id:"burn",   group:"Arms", name:"Curl Burnout", sets:1, reps:"max", w:6, note:"Near-failure · clean"}
   ]},
  {id:"core", name:"Core & Abs", icon:"🎯",
   desc:"Midsection focus — abs, obliques and deep core. A 10–15 min finisher or standalone.",
   ex:[
    {id:"co_lr", group:"Core", name:"Lying Leg Raise", sets:4, reps:"15", w:0, note:"Slow · don't swing"},
    {id:"co_plk",group:"Core", name:"Plank", sets:3, reps:"60s", w:0, note:"Straight line · brace"},
    {id:"co_rt", group:"Core", name:"Weighted Russian Twist", sets:3, reps:"20", w:6, note:"Hold DB · rotate slow"},
    {id:"co_db", group:"Core", name:"Dead Bug", sets:3, reps:"12 / side", w:0, note:"Low back flat to floor"},
    {id:"co_sc", group:"Core", name:"Suitcase Hold", sets:3, reps:"30s / side", w:14, note:"KB one side · stay upright"},
    {id:"co_cr", group:"Core", name:"Crunch", sets:3, reps:"20", w:0, note:"Squeeze at top"}
   ]}
];

var workouts=load(K_WK,null);
if(!workouts){workouts=JSON.parse(JSON.stringify(DEFAULT_WORKOUTS));}
else{DEFAULT_WORKOUTS.forEach(function(dw){var e=workouts.find(function(w){return w.id===dw.id;});
  if(!e)workouts.push(JSON.parse(JSON.stringify(dw)));else{if(!e.desc)e.desc=dw.desc;if(!e.icon)e.icon=dw.icon;}});}
save(K_WK,workouts);
var sessions=load(K_SESS,[]);
var current=load(K_CUR,{});
var body=load(K_BODY,[]);
var settings=load(K_SET,{rest:90,activeWk:workouts[0].id});
if(!workouts.some(function(w){return w.id===settings.activeWk;}))settings.activeWk=workouts[0].id;
if(!settings.celebrated)settings.celebrated=[]; /* "exId:weight" milestones already celebrated */

function activeWk(){return workouts.find(function(w){return w.id===settings.activeWk;})||workouts[0];}
function wkById(id){return workouts.find(function(w){return w.id===id;});}
function ck(exId){return settings.activeWk+":"+exId;}

/* THE 4-WEEK PLAN */
var PLAN_DAYS=[
  {tag:"Day 1", wkId:"push"},
  {tag:"Day 2", wkId:"pull"},
  {tag:"Day 3", wkId:"legs"},
  {tag:"Day 4", wkId:"fullbody"}
];
var PLAN_WEEKS=[
  {n:1,title:"Baseline & form",note:"Run each session once. Pick weights you control for every rep and stop ~2 reps short of failure. Log every set — these numbers are the benchmark you'll beat.",
   bullets:["Technique over weight — slow and clean","Rest 90s between sets","Write down weight + reps for all sets"]},
  {n:2,title:"Add reps",note:"Same weights as Week 1, but add 1–2 reps to every set. The 'Prev' column shows last week's numbers to chase.",
   bullets:["Beat Week 1's reps on every set","Keep 1–2 reps in reserve","Add a Core & Abs finisher to 2 days"]},
  {n:3,title:"Add sets & tempo",note:"Add one extra set to the first exercise of each session, and lower the weight over a slow 3–4 second count for more time under tension.",
   bullets:["+1 set on the first (main) lift","3–4s lowering on every rep","Drop rest to 60–75s"]},
  {n:4,title:"Peak week",note:"Push to the top of every rep range and add a 1–2s pause at the hardest point (bottom of squats/presses). Then restart the cycle heavier.",
   bullets:["Hit the top rep target on all sets","Add pauses at the bottom","Then repeat Week 1 — heavier or harder variation"]}
];

function uid(){return Math.random().toString(36).slice(2,8);}
function todayISO(){var d=new Date();var o=d.getTimezoneOffset();return new Date(d-o*60000).toISOString().slice(0,10);}
function fmtDate(iso){var d=new Date(iso+"T00:00:00");return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});}
function shortDate(iso){var d=new Date(iso+"T00:00:00");return d.toLocaleDateString(undefined,{day:"numeric",month:"short"});}
function fmtNum(n){return (Math.round(n*10)/10).toLocaleString();}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1600);}
function lastFor(exId){for(var i=sessions.length-1;i>=0;i--){var ex=(sessions[i].exercises||[]).find(function(e){return e.id===exId;});
  if(ex&&ex.sets&&ex.sets.length)return ex.sets;}return null;}
function bestWeight(exId){var b=0;sessions.forEach(function(s){(s.exercises||[]).forEach(function(e){
  if(e.id===exId)e.sets.forEach(function(st){if(st.w>b&&st.r>0)b=st.w;});});});return b;}
function sessionVolume(s){var v=0;(s.exercises||[]).forEach(function(e){e.sets.forEach(function(st){v+=(st.w||0)*(st.r||0);});});return v;}

/* REST TIMER */
var rest={left:0,iv:null};
function beep(){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.15;o.start();
  setTimeout(function(){o.frequency.value=1200;},120);
  setTimeout(function(){g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);o.stop(c.currentTime+.12);},260);}catch(e){}}
function fmtT(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}
function renderRest(){document.getElementById("restTime").textContent=fmtT(Math.max(0,rest.left));}
function stopRest(){clearInterval(rest.iv);rest.iv=null;rest.left=0;document.getElementById("restbar").classList.remove("show");}
function startRest(sec){if(!sec)return;rest.left=sec;document.getElementById("restbar").classList.add("show");renderRest();
  clearInterval(rest.iv);rest.iv=setInterval(function(){rest.left--;renderRest();
    if(rest.left<=0){clearInterval(rest.iv);rest.iv=null;beep();if(navigator.vibrate)navigator.vibrate([180,80,180]);
      document.getElementById("restTime").textContent="Go!";setTimeout(function(){document.getElementById("restbar").classList.remove("show");},2500);}},1000);}
/* EXERCISE TIMER (for time-based exercises like plank) */
var exTimer=null;
function startExTimer(sec,btn,st,doneEl,onDone){
  if(exTimer){clearInterval(exTimer.iv);exTimer.btn.classList.remove("running");exTimer.btn.textContent="▶ Start";exTimer=null;}
  if(!sec||sec<0)sec=0;
  var left=sec;btn.classList.add("running");btn.textContent=fmtT(left);exTimer={btn:btn};
  exTimer.iv=setInterval(function(){left--;
    if(left<=0){clearInterval(exTimer.iv);exTimer=null;btn.classList.remove("running");btn.textContent="✓ Done";
      beep();if(navigator.vibrate)navigator.vibrate([180,80,180]);
      st.done=true;doneEl.className="done on";doneEl.textContent="✓";save(K_CUR,current);if(onDone)onDone();
      setTimeout(function(){if(!btn.classList.contains("running"))btn.textContent="▶ Start";},2200);return;}
    btn.textContent=fmtT(left);
  },1000);
}
document.getElementById("restAdd").addEventListener("click",function(){if(!rest.iv)startRest(15);else{rest.left+=15;renderRest();}});
document.getElementById("restSkip").addEventListener("click",stopRest);
function renderRestSeg(){document.querySelectorAll("#restSeg button").forEach(function(b){b.classList.toggle("on",parseInt(b.dataset.s,10)===settings.rest);});}
document.querySelectorAll("#restSeg button").forEach(function(b){b.addEventListener("click",function(){
  settings.rest=parseInt(b.dataset.s,10);save(K_SET,settings);renderRestSeg();if(settings.rest)startRest(settings.rest);else stopRest();});});

/* WORKOUT SHEET (picker) */
function openSheet(){
  var host=document.getElementById("sheetList");host.innerHTML="";
  workouts.forEach(function(w){
    var nSets=w.ex.reduce(function(a,e){return a+e.sets;},0);
    var row=document.createElement("div");row.className="wk-opt"+(w.id===settings.activeWk?" on":"");
    row.innerHTML='<div class="ico">'+(w.icon||"🏋️")+'</div>'+
      '<div style="flex:1"><div class="nm">'+w.name+'</div>'+
      (w.desc?'<div class="ds">'+w.desc+'</div>':'')+
      '<div class="meta">'+w.ex.length+' exercises · ~'+nSets+' sets</div></div>'+
      (w.id===settings.activeWk?'<div class="ck">✓</div>':'');
    row.addEventListener("click",function(){selectWorkout(w.id);});
    host.appendChild(row);
  });
  document.getElementById("sheet").classList.add("show");
}
function closeSheet(){document.getElementById("sheet").classList.remove("show");}
function selectWorkout(id){settings.activeWk=id;save(K_SET,settings);closeSheet();renderWorkout();window.scrollTo(0,0);}
document.getElementById("wkBtn").addEventListener("click",openSheet);
document.getElementById("sheetScrim").addEventListener("click",closeSheet);
/* CUSTOM WORKOUT BUILDER */
function exerciseLibrary(){var seen={},lib=[];
  DEFAULT_WORKOUTS.concat(workouts).forEach(function(w){w.ex.forEach(function(e){
    if(!seen[e.name]){seen[e.name]=1;lib.push({name:e.name,group:e.group,sets:e.sets,reps:e.reps,w:e.w,note:e.note});}});});
  return lib;}
function lastForName(name){for(var i=sessions.length-1;i>=0;i--){var e=(sessions[i].exercises||[]).find(function(x){return x.name===name;});if(e&&e.sets&&e.sets.length)return e.sets;}return null;}
function applyReps(libReps,n,timed){if(!/^\s*\d/.test(libReps))return timed?(n+"s"):String(n);
  return n+(timed?"s":"")+libReps.replace(/^\s*\d+\s*s?/i,"");}
function suggestLib(le){var timed=isTimed(le),prev=lastForName(le.name);
  if(!prev)return {sets:le.sets,reps:le.reps,w:le.w,fromHistory:false};
  var top=prev.reduce(function(m,s){return (!m||s.w>m.w||(s.w===m.w&&s.r>m.r))?s:m;},null);
  return {sets:prev.length,reps:applyReps(le.reps,top.r,timed),w:top.w,fromHistory:true};}
var builderSel={};
function openBuilder(){document.getElementById("builderName").value="";builderSel={};renderBuilderList();document.getElementById("builder").classList.add("show");}
function closeBuilder(){document.getElementById("builder").classList.remove("show");}
function updateBuilderCount(){var n=Object.keys(builderSel).length,b=document.getElementById("builderCreate");
  b.textContent=n?("Create workout · "+n+" exercise"+(n>1?"s":"")):"Pick at least one exercise";b.style.opacity=n?"1":".5";}
function renderBuilderList(){var host=document.getElementById("builderList");host.innerHTML="";
  var lib=exerciseLibrary(),groups={};lib.forEach(function(e){(groups[e.group]=groups[e.group]||[]).push(e);});
  var order=["Legs","Push","Chest","Shoulders","Triceps","Pull","Back","Arms","Core","Other"];
  Object.keys(groups).sort(function(a,b){var ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);}).forEach(function(g){
    var gh=document.createElement("div");gh.className="lib-group";gh.textContent=g;host.appendChild(gh);
    groups[g].forEach(function(e){var sug=suggestLib(e);
      var row=document.createElement("div");row.className="lib-row"+(builderSel[e.name]?" on":"");

function defReps(ex){var n=parseInt(ex.reps,10);return isNaN(n)?"":n;} /* leading number of target, e.g. "12 / leg" -> 12; "max" -> "" */
function isTimed(ex){return /\d\s*s/i.test(ex.reps);} /* time-based if target has a number followed by "s", e.g. "45s", "30s / side" */
/* ---- auto-progression: targets climb based on last performance ---- */
function repHi(ex){if(isTimed(ex))return (parseInt(ex.reps,10)||30)+30;var b=parseInt(ex.reps,10);return isNaN(b)?null:b+4;} /* rep ceiling before "go heavier" */
function repStep(ex){return isTimed(ex)?5:1;} /* +5s for holds, +1 rep otherwise */
function suggestSet(ex,i){ /* what to aim for this session, per set, from last time */
  var prev=lastFor(ex.id);if(!prev)return {w:ex.w,r:defReps(ex)};
  var b=prev[i]||prev[prev.length-1];var hi=repHi(ex);var r=(parseInt(b.r,10)||0)+repStep(ex);
  if(hi!=null&&r>hi)r=hi;return {w:(parseFloat(b.w)||0),r:r};
}
function leveledUp(ex){ /* hit the rep ceiling on every set last time -> ready to add weight */
  var prev=lastFor(ex.id),hi=repHi(ex);if(!prev||hi==null)return false;
  return prev.length>=ex.sets&&prev.every(function(s){return (parseInt(s.r,10)||0)>=hi;});
}
function fmtTarget(w,r,timed){if(timed)return r+"s";return (w>0?(w+"kg×"+r):(r+" reps"));}
function ensureCurrent(ex){var k=ck(ex.id);if(!current[k]){current[k]=[];for(var i=0;i<ex.sets;i++){var s=suggestSet(ex,i);current[k].push({w:s.w,r:s.r,done:false});}}}

  ad.addEventListener("click",function(){var last=sets[sets.length-1]||{w:ex.w};sets.push({w:last.w,r:defReps(ex),done:false});save(K_CUR,current);renderWorkout();});
  tools.appendChild(rm);tools.appendChild(ad);card.appendChild(tools);return card;

function finishWorkout(){var exs=[];

}
function stat(v,k,accent){return '<div class="stat"><div class="v'+(accent?' accent':'')+'">'+v+'</div><div class="k">'+k+'</div></div>';}
function chartCard(title,sub,node){var c=document.createElement("div");c.className="chartcard";
  c.innerHTML='<div class="ct">'+title+'</div><div class="cs">'+sub+'</div>';c.appendChild(node);return c;}
var NS="http://www.w3.org/2000/svg";
function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}
function barChart(data,integer){var W=320,H=150,pl=8,pr=8,pt=10,pb=22;
  var svg=el("svg",{class:"chart",viewBox:"0 0 "+W+" "+H,preserveAspectRatio:"none"});if(!data.length)return svg;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))||1;var iw=W-pl-pr,bw=iw/data.length,bar=Math.min(bw*0.6,34);
  data.forEach(function(d,i){var h=(d.v/max)*(H-pt-pb);var x=pl+i*bw+(bw-bar)/2,y=H-pb-h;
    svg.appendChild(el("rect",{x:x,y:y,width:bar,height:Math.max(h,1),rx:4,fill:d.v?"url(#g1)":"#2c3140"}));
    if(d.v){var t=el("text",{x:x+bar/2,y:y-3,"text-anchor":"middle","font-size":"8.5"});t.textContent=integer?d.v:fmtNum(d.v);svg.appendChild(t);}
    var lb=el("text",{x:x+bar/2,y:H-7,"text-anchor":"middle"});lb.textContent=d.label;svg.appendChild(lb);});
  var defs=el("defs",{});var lg=el("linearGradient",{id:"g1",x1:"0",y1:"0",x2:"0",y2:"1"});
  lg.appendChild(el("stop",{offset:"0","stop-color":"#86acd2"}));lg.appendChild(el("stop",{offset:"1","stop-color":"#6fb6a6"}));
  defs.appendChild(lg);svg.appendChild(defs);return svg;}
function lineChart(data,color){color=color||"#86acd2";var W=320,H=160,pl=26,pr=10,pt=12,pb=22;
  var svg=el("svg",{class:"chart",viewBox:"0 0 "+W+" "+H});
  if(!data.length){var t=el("text",{x:W/2,y:H/2,"text-anchor":"middle"});t.textContent="No data";svg.appendChild(t);return svg;}
  var vals=data.map(function(d){return d.v;});var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals);
  if(max===min){max=max+1;min=Math.max(0,min-1);}var iw=W-pl-pr,ih=H-pt-pb;
  function X(i){return data.length===1?pl+iw/2:pl+(i/(data.length-1))*iw;}function Y(v){return pt+ih-((v-min)/(max-min))*ih;}
  [0,.5,1].forEach(function(f){var y=pt+ih*f;svg.appendChild(el("line",{x1:pl,y1:y,x2:W-pr,y2:y,stroke:"#222633","stroke-width":1}));
    var tv=el("text",{x:pl-4,y:y+3,"text-anchor":"end"});tv.textContent=Math.round(max-(max-min)*f);svg.appendChild(tv);});
  var dpath="";data.forEach(function(d,i){dpath+=(i?"L":"M")+X(i)+" "+Y(d.v)+" ";});var idc=color.replace("#","");
  var defs=el("defs",{});var lg=el("linearGradient",{id:"lg"+idc,x1:"0",y1:"0",x2:"0",y2:"1"});
  lg.appendChild(el("stop",{offset:"0","stop-color":color,"stop-opacity":".35"}));lg.appendChild(el("stop",{offset:"1","stop-color":color,"stop-opacity":"0"}));
  defs.appendChild(lg);svg.appendChild(defs);
  svg.appendChild(el("path",{d:dpath+"L"+X(data.length-1)+" "+(pt+ih)+" L"+X(0)+" "+(pt+ih)+" Z",fill:"url(#lg"+idc+")"}));
  svg.appendChild(el("path",{d:dpath,fill:"none",stroke:color,"stroke-width":2.5,"stroke-linejoin":"round","stroke-linecap":"round"}));
  data.forEach(function(d,i){svg.appendChild(el("circle",{cx:X(i),cy:Y(d.v),r:3.2,fill:color,stroke:"#0e0f13","stroke-width":1.5}));
    if(data.length<=8){var t=el("text",{x:X(i),y:Y(d.v)-7,"text-anchor":"middle","font-size":"9"});t.textContent=d.v;svg.appendChild(t);}});
  data.forEach(function(d,i){if(data.length<=8||i%2===0){var lb=el("text",{x:X(i),y:H-6,"text-anchor":"middle"});lb.textContent=d.label;svg.appendChild(lb);}});
  return svg;}
function makeExport(){var c=document.createElement("div");c.className="chartcard";
  c.innerHTML='<div class="ct">Your data</div><div class="cs">Stored only on this device. Back it up here.</div>';
  var r=document.createElement("div");r.className="row2";
  var ex=document.createElement("button");ex.className="btn ghost sm";ex.textContent="Export backup";
  ex.addEventListener("click",function(){var blob=new Blob([JSON.stringify({workouts:workouts,sessions:sessions,body:body},null,2)],{type:"application/json"});
    var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="muscle-time-"+todayISO()+".json";a.click();});
  var imp=document.createElement("button");imp.className="btn ghost sm";imp.textContent="Import backup";
  imp.addEventListener("click",function(){var inp=document.createElement("input");inp.type="file";inp.accept="application/json";
    inp.onchange=function(){var f=inp.files[0];if(!f)return;var rd=new FileReader();
      rd.onload=function(){try{var o=JSON.parse(rd.result);if(o.sessions){sessions=o.sessions;save(K_SESS,sessions);}
        if(o.workouts){workouts=o.workouts;save(K_WK,workouts);}if(o.body){body=o.body;save(K_BODY,body);}
        toast("Imported ✓");renderWorkout();renderStats();}catch(e){toast("Invalid file");}};rd.readAsText(f);};inp.click();});
  r.appendChild(ex);r.appendChild(imp);c.appendChild(r);return c;}

/* COACH — turns the log into tailored guidance */
function nameToId(){var m={};workouts.forEach(function(w){m[w.name]=w.id;});return m;}
function wkByName(n){return workouts.find(function(w){return w.name===n;});}
function recommendWorkout(){
  var planIds=PLAN_DAYS.map(function(d){return d.wkId;}),m=nameToId(),lastPlanId=null;
  for(var i=sessions.length-1;i>=0;i--){var id=m[sessions[i].workout];if(planIds.indexOf(id)>=0){lastPlanId=id;break;}}
  var nextId=lastPlanId?planIds[(planIds.indexOf(lastPlanId)+1)%planIds.length]:planIds[0];
  return {wkId:nextId,lastId:lastPlanId,trainedToday:sessions.some(function(s){return s.date===todayISO();})};
}
function setScore(st){return st.w>0?st.w*st.r:st.r;}
function muscleBalance(days){
  var since=Date.now()-days*86400000,reg={Legs:0,Push:0,Pull:0,Arms:0,Core:0};
  function mg(g){if(g==="Legs")return "Legs";if(["Push","Chest","Shoulders","Triceps"].indexOf(g)>=0)return "Push";
    if(["Pull","Back"].indexOf(g)>=0)return "Pull";if(g==="Arms")return "Arms";if(g==="Core")return "Core";return null;}
  sessions.forEach(function(s){var t=s.ts||new Date(s.date+"T12:00:00").getTime();if(t<since)return;
    s.exercises.forEach(function(e){var r=mg(e.group);if(r)reg[r]+=e.sets.length;});});
  return reg;
}
function coachInsights(){
  var out=[],last=sessions[sessions.length-1];
  if(last)last.exercises.forEach(function(e){var top=e.sets.reduce(function(m,x){return Math.max(m,x.w);},0),prior=0;
    sessions.slice(0,-1).forEach(function(s){s.exercises.forEach(function(x){if(x.id===e.id)x.sets.forEach(function(st){prior=Math.max(prior,st.w);});});});
    if(top>0&&top>prior)out.push({pri:1,icon:"🏆",text:"New PR — "+e.name+" at "+top+"kg"});});
  var byEx={};sessions.forEach(function(s){s.exercises.forEach(function(e){(byEx[e.id]=byEx[e.id]||[]).push({name:e.name,score:e.sets.reduce(function(m,x){return Math.max(m,setScore(x));},0)});});});
  Object.keys(byEx).forEach(function(id){var a=byEx[id];if(a.length>=3&&a[a.length-1].score<=a[a.length-3].score)
    out.push({pri:3,icon:"⚠️",text:a[a.length-1].name+" has stalled — slow the lowering to 4s or add 1 rep"});});
  var vw={};sessions.forEach(function(s){var w=isoWeek(new Date(s.date+"T12:00:00"));vw[w]=(vw[w]||0)+sessionVolume(s);});
  var tw=vw[isoWeek(new Date())]||0,lw=vw[isoWeek(new Date(Date.now()-7*86400000))]||0;
  if(tw>0&&lw>0){var pct=Math.round((tw-lw)/lw*100);
    if(pct>=5)out.push({pri:2,icon:"📈",text:"Volume up "+pct+"% vs last week — keep it rolling"});
    else if(pct<=-15)out.push({pri:4,icon:"📉",text:"Volume down "+Math.abs(pct)+"% vs last week — fine on a lighter week"});}
  return out.sort(function(a,b){return a.pri-b.pri;}).slice(0,3);
}
function renderBodyMap(){
  var bal=muscleBalance(14),maxv=Math.max(1,bal.Legs,bal.Push,bal.Pull,bal.Arms,bal.Core);
  function op(g){return Math.round((0.10+0.90*(bal[g]/maxv))*100)/100;}
  var svg=el("svg",{viewBox:"0 0 300 286",class:"bodymap"}),PINK="#6fb6a6";
  var defs=el("defs",{});
  var grad=el("linearGradient",{id:"bodyg",x1:"0",y1:"0",x2:"0",y2:"1"});

  defs.appendChild(grad);

  flt.appendChild(el("feGaussianBlur",{stdDeviation:"2.4"}));defs.appendChild(flt);

  /* connected, tapered silhouette */
  function base(ox){var g=el("g",{transform:"translate("+ox+",0)",fill:"url(#bodyg)",stroke:"#39423f","stroke-width":"1","stroke-linejoin":"round"});
    g.appendChild(el("ellipse",{cx:55,cy:19,rx:12,ry:14}));
    g.appendChild(el("path",{d:"M50,31 L60,31 L61,43 L49,43 Z"}));

    g.appendChild(el("path",{d:"M32,52 C24,53 20,59 19,67 L16,101 C15,108 22,109 25,103 L31,68 C33,59 34,54 33,52 Z"}));
    g.appendChild(el("path",{d:"M78,52 C86,53 90,59 91,67 L94,101 C95,108 88,109 85,103 L79,68 C77,59 76,54 77,52 Z"}));
    g.appendChild(el("path",{d:"M38,114 L72,114 L70,140 C68,147 62,150 55,150 C48,150 42,147 40,140 Z"}));
    g.appendChild(el("path",{d:"M41,138 L54,138 L54,192 L52,240 C52,247 45,247 43,240 L40,192 Z"}));
    g.appendChild(el("path",{d:"M56,138 L69,138 L70,192 L67,240 C65,247 58,247 58,240 L56,192 Z"}));
    return g;}
  function glow(ox,blobs){var g=el("g",{transform:"translate("+ox+",0)",filter:"url(#mglow)"});
    blobs.forEach(function(b){g.appendChild(el("ellipse",{cx:b[0],cy:b[1],rx:b[2],ry:b[3],fill:PINK,opacity:op(b[4])}));});return g;}
  svg.appendChild(base(15));
  svg.appendChild(glow(15,[
    [31,54,7,6,"Push"],[79,54,7,6,"Push"],     /* delts */
    [46,64,9,7,"Push"],[64,64,9,7,"Push"],     /* chest */

    [55,96,11,17,"Core"],                      /* abs */
    [46,172,8,26,"Legs"],[64,172,8,26,"Legs"]  /* quads */
  ]));
  svg.appendChild(base(175));
  svg.appendChild(glow(175,[
    [31,54,7,6,"Push"],[79,54,7,6,"Push"],     /* traps/rear delts */
    [55,80,16,22,"Pull"],                      /* lats/upper back */
    [23,80,5,11,"Arms"],[87,80,5,11,"Arms"],   /* triceps */
    [47,130,9,8,"Legs"],[63,130,9,8,"Legs"],   /* glutes */
    [46,180,8,22,"Legs"],[64,180,8,22,"Legs"], /* hamstrings */
    [46,222,6,15,"Legs"],[64,222,6,15,"Legs"]  /* calves */
  ]));
  function lbl(x,t){var e=el("text",{x:x,y:280,"text-anchor":"middle","font-size":"10.5",fill:"#9aa3b5","font-weight":"700","letter-spacing":"1"});e.textContent=t;svg.appendChild(e);}
  lbl(70,"FRONT");lbl(230,"BACK");
  return svg;
}
function renderCoach(){
  var host=document.getElementById("coachBody");host.innerHTML="";
  var h=new Date().getHours(),greet=h<12?"Good morning":h<18?"Good afternoon":"Good evening";
  var intro=document.createElement("div");intro.style.cssText="margin:6px 2px 14px";
  intro.innerHTML='<div style="font-size:13px;color:var(--muted2)">'+greet+'</div><div style="font-size:21px;font-weight:600;margin-top:2px;letter-spacing:.2px">Your coach</div>';
  host.appendChild(intro);
  var rec=recommendWorkout(),w=wkById(rec.wkId);
  var pick=document.createElement("div");pick.className="coachhero";
  if(rec.trainedToday){
    var todayNames=[];sessions.forEach(function(s){if(s.date===todayISO()&&todayNames.indexOf(s.workout)<0)todayNames.push(s.workout);});
    var rows=todayNames.map(function(nm){var w2=wkByName(nm);
      return '<div class="ch-donerow"><span class="ch-donecheck">✓</span><span class="ch-doneico">'+((w2&&w2.icon)||"🏋️")+'</span><span class="ch-donename">'+nm+'<small>complete for today</small></span></div>';}).join("");
    pick.className="coachhero chdone";
    pick.innerHTML='<div class="ch-label" style="color:var(--good)">DONE TODAY</div>'+rows+
      '<div class="ch-reason" style="margin-top:10px">Great work — that’s today logged. Rest up, or train again below.</div>'+
      '<button class="btn ghost" id="coachStart">Train again: '+w.name+' ▸</button>';
  }else{
    var reason=rec.lastId?("You last did "+wkById(rec.lastId).name+". Next up in your plan:"):"Let’s kick off your 4-week plan with:";
    pick.innerHTML='<div class="ch-label">TODAY’S SESSION</div>'+
      '<div class="ch-reason">'+reason+'</div>'+
      '<div class="ch-row"><span class="ch-ico">'+(w.icon||"🏋️")+'</span><span class="ch-name">'+w.name+'</span></div>'+
      '<button class="btn" id="coachStart">Start '+w.name+' ▸</button>';
  }
  host.appendChild(pick);
  var weekCount=sessions.filter(function(s){return isoWeek(new Date(s.date+"T12:00:00"))===isoWeek(new Date());}).length;
  var goal=4,pctW=Math.min(100,Math.round(weekCount/goal*100));
  var wk=document.createElement("div");wk.className="chcard";
  wk.innerHTML='<div class="chc-top"><span>This week</span><span class="chc-em">'+weekCount+' / '+goal+' sessions</span></div>'+
    '<div class="sp-bar" style="margin-top:8px"><div class="sp-fill" style="width:'+pctW+'%"></div></div>';
  host.appendChild(wk);
  var mapCard=document.createElement("div");mapCard.className="chcard";
  mapCard.innerHTML='<div class="chc-top"><span>Muscle map</span><span class="chc-sub">last 14 days · brighter = more</span></div>';
  mapCard.appendChild(renderBodyMap());
  mapCard.insertAdjacentHTML("beforeend",'<div class="bm-legend"><span>Less</span><div class="bm-grad"></div><span>More</span></div>');
  host.appendChild(mapCard);
  var bal=muscleBalance(14),vals=Object.keys(bal).map(function(k){return bal[k];}),max=Math.max(1,Math.max.apply(null,vals)),total=vals.reduce(function(a,b){return a+b;},0);
  var mb=document.createElement("div");mb.className="chcard";
  var rows=Object.keys(bal).map(function(k){var v=bal[k];return '<div class="mb-row"><span class="mb-k">'+k+'</span><div class="mb-bar"><div class="mb-fill" style="width:'+Math.round(v/max*100)+'%"></div></div><span class="mb-v">'+v+'</span></div>';}).join("");
  var lag=null,min=1e9;if(total>0)Object.keys(bal).forEach(function(k){if(bal[k]<min){min=bal[k];lag=k;}});
  mb.innerHTML='<div class="chc-top"><span>Muscle balance</span><span class="chc-sub">last 14 days · sets</span></div>'+rows+
    (lag&&total>0?'<div class="mb-flag">⚖️ Lagging: <b>'+lag+'</b> — give it priority soon.</div>':'');
  host.appendChild(mb);
  var ins=coachInsights();
  if(ins.length){var ic=document.createElement("div");ic.className="chcard";
    ic.innerHTML='<div class="chc-top"><span>Insights</span></div>'+ins.map(function(x){return '<div class="ins-row"><span class="ins-ic">'+x.icon+'</span><span>'+x.text+'</span></div>';}).join("");
    host.appendChild(ic);}
  if(!sessions.length){var e=document.createElement("div");e.className="empty";
    e.innerHTML='<div class="big">🧭</div>Log a workout and your coach will start giving you tailored insights.';host.appendChild(e);}
  var sb=document.getElementById("coachStart");if(sb)sb.addEventListener("click",function(){selectWorkout(rec.wkId);setTab("workout");});
}

/* CELEBRATION */
function showCelebration(ms){
  var body=document.getElementById("celeBody");
  body.innerHTML=ms.map(function(m){
    var msg=m.timed?"You held every set to the top — add more time! ⏱":
      (m.w>0?("You maxed your reps at "+m.w+"kg — time to go heavier! ⬆"):"You smashed the rep target — make it harder! 🔥");
    return '<div class="cele-ex"><b>'+m.name+'</b><br><span>'+msg+'</span></div>';}).join("");
  var ov=document.getElementById("celebrate");ov.classList.add("show");
  var colors=["#6fb6a6","#86acd2","#b9aed8","#dcc79a","#ffffff"];
  for(var i=0;i<42;i++){var c=document.createElement("div");c.className="confetti";
    c.style.left=Math.random()*100+"%";c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.6+Math.random()*1.8)+"s";c.style.animationDelay=(Math.random()*.5)+"s";
    ov.appendChild(c);}
  beep();if(navigator.vibrate)navigator.vibrate([40,50,90]);
}
function closeCelebration(){var ov=document.getElementById("celebrate");ov.classList.remove("show");
  [].slice.call(ov.querySelectorAll(".confetti")).forEach(function(c){c.remove();});}
document.getElementById("celeBtn").addEventListener("click",closeCelebration);
document.getElementById("celeScrim").addEventListener("click",closeCelebration);

/* TABS */
function setTab(t){["coach","workout","plan","history","body","stats"].forEach(function(x){document.getElementById("tab-"+x).classList.toggle("hide",x!==t);});
  document.querySelectorAll("nav button").forEach(function(b){b.classList.toggle("on",b.dataset.tab===t);});
  if(t==="coach")renderCoach();if(t==="plan")renderPlan();if(t==="history")renderHistory();if(t==="body")renderBody();if(t==="stats")renderStats();window.scrollTo(0,0);}
document.querySelectorAll("nav button").forEach(function(b){b.addEventListener("click",function(){setTab(b.dataset.tab);});});
document.getElementById("finishBtn").addEventListener("click",finishWorkout);
document.getElementById("resetBtn").addEventListener("click",function(){if(confirm("Clear all entries for this workout today?")){
  activeWk().ex.forEach(function(ex){delete current[ck(ex.id)];});save(K_CUR,current);renderWorkout();toast("Cleared");}});
document.getElementById("addExBtn").addEventListener("click",function(){var nm=document.getElementById("newExName").value.trim();
  var g=document.getElementById("newExGroup").value;if(!nm)return;
  activeWk().ex.push({id:uid(),group:g,name:nm,sets:3,reps:"12",w:0,note:""});save(K_WK,workouts);
  document.getElementById("newExName").value="";renderWorkout();toast("Added "+nm);});

function setHeadH(){var h=document.querySelector("header").offsetHeight;document.documentElement.style.setProperty("--headh",h+"px");}
setHeadH();window.addEventListener("resize",setHeadH);
renderWorkout();setTab("coach"); /* land on the Coach dashboard */
})();
